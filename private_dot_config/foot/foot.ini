# Minimal foot config — supports CSI-u extended keys (Shift+Enter, Alt+Enter, etc.)
# Use this terminal instead of GNOME Terminal on Pop!_OS for TUI apps like pi

[main]
term=foot
dpi-aware=yes
pad=2x2 center
initial-window-size-chars=120x40
font=monospace:size=10

[scrollback]
lines=10000

[colors]
background=1b1b1b
foreground=e8e8e8

[mouse]
hide-when-typing=yes

[key-bindings]
# scrollback search
search-start=Control+Shift+f

[search-bindings]
cancel=Escape Control+c
commit=Return

[url-bindings]
cancel=Escape Control+c
toggle-url-visible=Control+Shift+u
