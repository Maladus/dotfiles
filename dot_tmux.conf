# Enable extended keys (Ctrl+Enter, Shift+Enter, etc.)
# 'always' forces forwarding to inner apps; 'on' only sends if the app requests it.
set -g extended-keys always

# Use CSI-u format for extended keys (required by pi TUI)
set -g extended-keys-format csi-u

# Lower escape delay so tmux doesn't swallow key combos
set -g escape-time 10

# Allow terminal passthrough for image/TUI features (needed by pi)
set -g allow-passthrough on

# Enable focus events for TUI apps
set -g focus-events on

# Set Defautl Shell
set-option -g default-shell /bin/zsh

# Force UTF-8 locale for all panes
set-environment -g LANG en_US.UTF-8
set-environment -g LC_ALL en_US.UTF-8

# Enable xterm key sequences for arrow keys and special chars in zsh
set -g xterm-keys on

# Proper terminal type for color and key support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar at top
set -g status-position top
set -g status-style bg='#FFAD00',fg=black

# Scrollbar colour: orange while scrolled up, dark orange when at the bottom.
# #{scroll_position} == 0 means we are at the live bottom of the buffer.
setw -g mode-style bg='#FFAD00',fg=black

# Reset to orange whenever copy mode is exited
set-hook -g after-copy-mode 'setw mode-style bg=#FFAD00,fg=black'

# ── Scroll UP actions → orange ───────────────────────────────────────────────
bind -T copy-mode-vi WheelUpPane   send-keys -X scroll-up    \; setw mode-style bg=#FFAD00,fg=black
bind -T copy-mode-vi k             send-keys -X cursor-up    \; setw mode-style bg=#FFAD00,fg=black
bind -T copy-mode-vi PageUp        send-keys -X page-up      \; setw mode-style bg=#FFAD00,fg=black
bind -T copy-mode-vi C-b           send-keys -X page-up      \; setw mode-style bg=#FFAD00,fg=black
bind -T copy-mode-vi C-u           send-keys -X halfpage-up  \; setw mode-style bg=#FFAD00,fg=black
bind -T copy-mode-vi g             send-keys -X history-top  \; setw mode-style bg=#FFAD00,fg=black

# ── Explicit jump to bottom → dark orange ──────────────────────────────────────────
bind -T copy-mode-vi G             send-keys -X history-bottom \; setw mode-style bg=#CC7A00,fg=black

# ── Scroll DOWN actions → dark orange if now at bottom, orange otherwise ────────────
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down   \; if-shell -F '#{?scroll_position,0,1}' 'setw mode-style bg=#CC7A00,fg=black' 'setw mode-style bg=#FFAD00,fg=black'
bind -T copy-mode-vi j             send-keys -X cursor-down   \; if-shell -F '#{?scroll_position,0,1}' 'setw mode-style bg=#CC7A00,fg=black' 'setw mode-style bg=#FFAD00,fg=black'
bind -T copy-mode-vi PageDown      send-keys -X page-down     \; if-shell -F '#{?scroll_position,0,1}' 'setw mode-style bg=#CC7A00,fg=black' 'setw mode-style bg=#FFAD00,fg=black'
bind -T copy-mode-vi C-f           send-keys -X page-down     \; if-shell -F '#{?scroll_position,0,1}' 'setw mode-style bg=#CC7A00,fg=black' 'setw mode-style bg=#FFAD00,fg=black'
bind -T copy-mode-vi C-d           send-keys -X halfpage-down \; if-shell -F '#{?scroll_position,0,1}' 'setw mode-style bg=#CC7A00,fg=black' 'setw mode-style bg=#FFAD00,fg=black'

# Mouse support: scroll, resize panes, select windows
set -g mouse on

# Vi-style keys in copy/scroll mode
setw -g mode-keys vi

# Start numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Pane navigation with hjkl (overrides default l=last-window)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
