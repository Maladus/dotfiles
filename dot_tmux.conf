# ── Terminal & Input ─────────────────────────────────────────────────────────
# Enable extended keys (Ctrl+Enter, Shift+Enter, etc.)
set -g extended-keys always
set -g extended-keys-format csi-u

# Low escape delay so tmux doesn't swallow key combos
set -g escape-time 10

# Passthrough for image/TUI features (needed by pi)
set -g allow-passthrough all

# Focus events for TUI apps
set -g focus-events on

# Locale
set-environment -g LANG C.utf8
set-environment -g LC_ALL C.utf8

# Shell
set -g default-shell /bin/zsh

# Truecolor support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Status Bar & Borders ──────────────────────────────────────────────────────
# (catppuccin theme provides these — see @catppuccin_flavor below)
set -g status-position top
# set -g status-style bg='#FFAD00',fg=black

# Pane borders (overridden by catppuccin theme)
# set -g pane-border-style fg='#4A4A4A',bg=default
# set -g pane-active-border-style fg='#FFAD00',bg=default

# Scroll position indicator: dark orange = scrolled up, orange = at bottom
set -g mode-style bg='#CC7A00',fg=black
set -w mode-style bg='#CC7A00',fg=black
set-hook -g after-copy-mode 'set -w mode-style bg=#CC7A00,fg=black'


# ── Explicit jump to bottom → orange ─────────────────────────────────────────
bind -T copy-mode-vi G             send-keys -X history-bottom \; set -w mode-style bg=#FFAD00,fg=black

# ── Scroll DOWN → orange if at bottom, else dark orange ──────────────────────
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down   \; if-shell -F '#{?scroll_position,0,1}' 'set -w mode-style bg=#FFAD00,fg=black' 'set -w mode-style bg=#CC7A00,fg=black'
bind -T copy-mode-vi j             send-keys -X cursor-down   \; if-shell -F '#{?scroll_position,0,1}' 'set -w mode-style bg=#FFAD00,fg=black' 'set -w mode-style bg=#CC7A00,fg=black'
bind -T copy-mode-vi PageDown      send-keys -X page-down     \; if-shell -F '#{?scroll_position,0,1}' 'set -w mode-style bg=#FFAD00,fg=black' 'set -w mode-style bg=#CC7A00,fg=black'
bind -T copy-mode-vi C-f           send-keys -X page-down     \; if-shell -F '#{?scroll_position,0,1}' 'set -w mode-style bg=#FFAD00,fg=black' 'set -w mode-style bg=#CC7A00,fg=black'
bind -T copy-mode-vi C-d           send-keys -X halfpage-down \; if-shell -F '#{?scroll_position,0,1}' 'set -w mode-style bg=#FFAD00,fg=black' 'set -w mode-style bg=#CC7A00,fg=black'

# ── Mouse & Copy Mode ──────────────────────────────────────────────────────────
set -g mouse on
set -w mode-keys vi

# Use OSC 52 for system clipboard (works over SSH, Wayland, no xclip needed)
set -s set-clipboard on

# Mouse selection: keep highlight after drag, press Enter/y to copy & exit
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# Clicking another pane exits copy mode
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X cancel

# Double / triple click: select word / line
bind -T copy-mode-vi DoubleClick1Pane  select-pane \; send-keys -X select-word \; send-keys -X copy-selection-no-clear
bind -T copy-mode-vi TripleClick1Pane  select-pane \; send-keys -X select-line \; send-keys -X copy-selection-no-clear
bind -n DoubleClick1Pane              select-pane \; copy-mode -H \; send-keys -X select-word \; send-keys -X copy-selection-no-clear
bind -n TripleClick1Pane              select-pane \; copy-mode -H \; send-keys -X select-line \; send-keys -X copy-selection-no-clear

# Search navigation updates scroll indicator
bind -T copy-mode-vi n send-keys -X search-again  \; if-shell -F '#{?scroll_position,0,1}' 'set -w mode-style bg=#FFAD00,fg=black' 'set -w mode-style bg=#CC7A00,fg=black'
bind -T copy-mode-vi N send-keys -X search-reverse \; if-shell -F '#{?scroll_position,0,1}' 'set -w mode-style bg=#FFAD00,fg=black' 'set -w mode-style bg=#CC7A00,fg=black'

# Middle-click paste (xclip fallback for systems without OSC 52)
bind -n MouseDown2Pane run -b 'xclip -out -selection clipboard | tmux load-buffer - ; tmux paste-buffer'

# ── Windows & Panes ───────────────────────────────────────────────────────────
set -g base-index 1
set -w pane-base-index 1
set -g renumber-windows on

# Pane navigation with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── QoL ───────────────────────────────────────────────────────────────────────
set -g history-limit 50000
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux'

# Catppuccin flavor: latte, frappe, macchiato, mocha
set -g @catppuccin_flavor 'macchiato'

# Use #W (window name) instead of #T (pane title)
set -g @catppuccin_window_text ' #W'
# Omerxx-style: show a zoom indicator (Nerd Font glyph) on the current window
# when a pane is zoomed. The glyph U+EB81 is a PUA code point — it only renders
# with a Nerd Font. Falls back to () brackets in a plain font.
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_status_style 'rounded'

# Status bar modules (Omerxx style: session on left, directory on right)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_directory}"

run '~/.tmux/plugins/tpm/tpm'
