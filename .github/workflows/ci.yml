name: Test Dotfiles

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ubuntu-latest:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zsh unzip

      - name: Run bootstrap
        run: bash install.sh

      - name: Run assertions
        run: |
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          python3 tests/assert.py
